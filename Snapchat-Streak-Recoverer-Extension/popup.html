<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snapchat Streak Recoverer</title>
  <link rel="stylesheet" href="popup.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- ═══════════════════════════════════════════════════ -->
    <!--  HEADER                                             -->
    <!-- ═══════════════════════════════════════════════════ -->
    <header id="app-header">
      <div class="header-left">
        <h1 class="app-title">Snapchat Streak Recoverer</h1>
        <p class="app-subtitle">Automated Support Form Submitter</p>
      </div>
      <div class="header-right">
        <button id="btn-profile" class="avatar-btn" title="Switch Profile">+</button>
        <button id="btn-settings" class="settings-btn" title="Settings">⚙ Settings</button>
      </div>
    </header>

    <!-- ═══════════════════════════════════════════════════ -->
    <!--  CONTROLS ROW                                       -->
    <!-- ═══════════════════════════════════════════════════ -->
    <div id="controls-row">
      <span id="selection-counter" class="sel-counter">0 Selected</span>
      <input type="text" id="search-input" class="search-bar" placeholder="🔍 Search friends...">
      <div class="bulk-actions">
        <button id="btn-select-all" class="icon-btn accent-outline" title="Select All">✓</button>
        <button id="btn-deselect-all" class="icon-btn danger-outline" title="Deselect All">✕</button>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════════════ -->
    <!--  FRIENDS LIST                                       -->
    <!-- ═══════════════════════════════════════════════════ -->
    <div id="friends-container">
      <div class="friends-header">
        <span id="friends-label">My Friends</span>
      </div>
      <div id="friends-list" class="friends-grid">
        <!-- Cards / rows dynamically injected -->
        <div id="empty-state" class="empty-state">
          <span class="empty-icon">👻</span>
          <p>No friends added yet</p>
          <p class="empty-hint">Add a friend below to get started</p>
        </div>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════════════ -->
    <!--  FOOTER                                             -->
    <!-- ═══════════════════════════════════════════════════ -->
    <div id="footer">
      <div class="add-friend-row">
        <input type="text" id="input-friend-name" class="add-input" placeholder="Contact Name (e.g. Ali)">
        <input type="text" id="input-friend-username" class="add-input" placeholder="Friend Username">
        <button id="btn-add-friend" class="add-btn">+ Add Friend</button>
      </div>
      <button id="btn-recover" class="recover-btn" disabled>🚀 RECOVER SELECTED STREAKS</button>
    </div>

    <!-- ═══════════════════════════════════════════════════ -->
    <!--  STATUS BAR                                         -->
    <!-- ═══════════════════════════════════════════════════ -->
    <div id="status-bar">
      <span id="status-text">✅ Ready</span>
      <div id="progress-bar-container" class="hidden">
        <div id="progress-bar" class="progress-fill"></div>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════ -->
  <!--  MODAL OVERLAY (shared)                             -->
  <!-- ═══════════════════════════════════════════════════ -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-content" class="modal-box">
      <!-- Dynamically filled by JS -->
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
